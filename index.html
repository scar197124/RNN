<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RNN — Real News Network</title>
  <meta name="description" content="Positive news feed highlighting uplifting, verified stories.">
  <link rel="stylesheet" href="assets/rnn.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="brand">
        <div class="logo"></div>
        <div>
          <h1>RNN — Real News Network</h1>
          <div class="meta">Last updated: <span id="last-updated"></span> • 20 stories + 5 in See More</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn" id="refresh-btn" onclick="location.reload()">Refresh</button>
        <a class="btn" href="data.json" download>Download Data</a>
      </div>
    </header>

    <div class="section-title">Today’s Highlights</div>
    <section class="grid" id="visible-grid"></section>

    <div class="see-more">
      <button class="btn" id="see-more-btn">See More (5)</button>
    </div>

    <section class="hidden-wrap">
      <div class="section-title">More Good News</div>
      <div class="grid" id="hidden-grid"></div>
      <div class="see-more">
        <button class="btn" id="collapse-btn">Collapse</button>
      </div>
    </section>
  </div>
  <script src="assets/rnn.js"></script>
</body>
</html>
