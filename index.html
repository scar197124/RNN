<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RNN - Real News Network</title>
  <style>
    body { background:#000; color:#fff; font-family:Arial, sans-serif; margin:0; padding:0; }
    header { background:#111; border-bottom:3px solid #FFD700; text-align:center; padding:20px 10px; }
    .logo-box { width:70px;height:70px;background:#FFD700;color:#000;display:flex;align-items:center;justify-content:center;
      font-weight:900;font-size:28px;border-radius:10px;margin:0 auto 10px;}
    header h1 {margin:0;font-size:26px;color:#FFD700;}
    header p {margin:4px 0 0;font-size:14px;color:#bbb;}
    .ticker {background:#FFD700;color:#000;padding:10px;font-weight:bold;white-space:nowrap;overflow:hidden;}
    .ticker span {display:inline-block;padding-left:100%;animation:ticker 15s linear infinite;}
    @keyframes ticker {0% {transform:translateX(0);}100% {transform:translateX(-100%);}}
    .featured-banner {background:#111;border:2px solid #FFD700;border-radius:12px;margin:20px;padding:20px;box-shadow:0 0 10px rgba(255,215,0,0.3);}
    .highlight-card h3 {color:#FFD700;margin-top:0;}
    .why {color:#FFD700;font-style:italic;font-size:14px;}
    .story-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin:20px;}
    .story-card {background:#111;padding:16px;border:2px solid #FFD700;border-radius:12px;box-shadow:0 0 6px rgba(255,215,0,0.2);}
    .story-card h3 {margin-top:0;color:#FFD700;}
    .badge {display:inline-block;margin:2px 4px 0 0;padding:2px 6px;font-size:12px;border-radius:6px;background:#444;color:#fff;}
  </style>
</head>
<body>
  <header>
    <div class="logo-box">RNN</div>
    <h1>Real News Network</h1>
    <p>Only the Real. Only the Good.</p>
  </header>

  <div class="ticker"><span>🌍 Global Highlights • ✨ Positive News • 🚀 Breakthroughs • 🌱 Environment Wins</span></div>

  <!-- Highlight of the Day -->
  <section class="featured-banner" id="highlight">
    <h2 style="color:#FFD700;margin:10px 0;">⭐ Highlight of the Day</h2>
    <div class="highlight-card">
      <h3 id="highlight-title"></h3>
      <p id="highlight-summary"></p>
      <p class="why" id="highlight-why"></p>
      <small id="highlight-category"></small>
    </div>
  </section>

  <!-- Story Grid -->
  <div class="story-grid" id="story-grid"></div>

  <script>
    fetch('rnn_master.json')
      .then(response => response.json())
      .then(data => {
        if (data.today && data.today.visible && data.today.visible.length > 0) {
          const first = data.today.visible[0];
          document.getElementById("highlight-title").innerText = first.title || "";
          document.getElementById("highlight-summary").innerText = first.summary || "";
          document.getElementById("highlight-why").innerHTML = first.why ? "<em>Why it matters:</em> " + first.why : "";
          const cat = first.category || "";
          const dt = first.date || "";
          document.getElementById("highlight-category").innerText = (cat && dt) ? (cat + " • " + dt) : (cat || dt);
        }

        const grid = document.getElementById("story-grid");
        data.today.visible.forEach(s => {
          const card = document.createElement("div");
          card.className = "story-card";
          card.innerHTML = `
            <h3>${s.title || ""}</h3>
            <p>${s.summary || ""}</p>
            ${s.why ? `<p class="why"><em>Why it matters:</em> ${s.why}</p>` : ""}
            ${s.category ? `<small class="badge">${s.category}</small>` : ""}
            ${s.date ? `<small class="badge">${s.date}</small>` : ""}
          `;
          grid.appendChild(card);
        });
      });
  </script>
</body>
</html>
